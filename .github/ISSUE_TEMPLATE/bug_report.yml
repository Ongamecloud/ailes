name: Bug Report
description: Report a bug or unexpected behavior in Calagopus
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, please search existing issues to avoid duplicates.
        For security vulnerabilities, follow the process in [SECURITY.md](../../SECURITY.md) instead.
        For panel related bugs, create an issue in [calagopus/panel](https://github.com/calagopus/panel/issues) instead.

  - type: input
    id: version
    attributes:
      label: Version
      description: What version of Calagopus Wings are you running?
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What should happen?
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output. This will be automatically formatted as code.
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Any additional environment details (OS, browser, panel version, etc.)
